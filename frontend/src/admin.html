<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body { background:#111; color:white; font-family:sans-serif; padding:20px }
    button { margin:5px; padding:10px; cursor:pointer }
  </style>
</head>
<body>

<h2>🧠 Admin Panel</h2>

<h3>Set Price</h3>
<button onclick="setPrice(35000)">35K</button>
<button onclick="setPrice(40000)">40K</button>
<button onclick="setPrice(45000)">45K</button>

<h3>Force Win</h3>
<button onclick="force(5)">+5%</button>
<button onclick="force(10)">+10%</button>
<button onclick="force(15)">+15%</button>
<button onclick="force(20)">+20%</button>
<button onclick="force(25)">+25%</button>
<button onclick="force(30)">+30%</button>

<h3>Force Loss</h3>
<button onclick="force(-2)">-2%</button>
<button onclick="force(-5)">-5%</button>
<button onclick="force(-7)">-7%</button>
<button onclick="force(-10)">-10%</button>
<button onclick="force(-12)">-12%</button>
<button onclick="force(-15)">-15%</button>

<script>
const API = "http://localhost:5000";

function setPrice(price) {
  fetch(API + "/api/admin/set-price", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ price })
  });
}

function force(percent) {
  fetch(API + "/api/admin/force-percent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ percent })
  });
}
</script>

</body>
</html>
